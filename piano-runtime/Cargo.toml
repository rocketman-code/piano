[package]
name = "piano-runtime"
version = "0.11.0"
edition = "2021"
rust-version = "1.59"
description = "Zero-dependency timing and allocation tracking runtime for piano profiler"
license = "MIT"
repository = "https://github.com/rocketman-code/piano"
keywords = ["profiling", "instrumentation"]
categories = ["development-tools::profiling"]

[features]
cpu-time = []
channels-tokio = ["tokio"]
channels-crossbeam = ["crossbeam-channel"]
channels-async = ["async-channel"]
channels-futures = ["futures-channel"]
_test_internals = []

[dependencies]
tokio = { version = "1", features = ["sync"], optional = true }
crossbeam-channel = { version = "0.5", optional = true }
async-channel = { version = "2", optional = true }
futures-channel = { version = "0.3", optional = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["html_reports"] }
serial_test = "3"
tempfile = "3"
tokio = { version = "1", features = ["rt-multi-thread", "macros", "time"] }

[[bench]]
name = "piano_future_overhead"
harness = false
