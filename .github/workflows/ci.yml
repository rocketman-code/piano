name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo clippy --workspace --all-targets --features piano-runtime/cpu-time -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
      - run: cargo test --workspace --features piano-runtime/cpu-time,piano-runtime/_test_internals

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
      - uses: Swatinem/rust-cache@v2
      - name: Install Rust 1.59 for runtime MSRV test
        run: rustup toolchain install 1.59.0 --profile minimal
      - run: cargo test --workspace

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: Swatinem/rust-cache@v2
      - run: cargo llvm-cov --workspace --features piano-runtime/cpu-time --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info

  test-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Reject unsafe env var mutation in runtime tests
        run: |
          # Tests must not use std::env::set_var / remove_var -- it causes
          # flaky failures by racing with parallel tests on process-global
          # state. Use flush_to(dir) or Command::env() instead.
          if grep -rn 'env::set_var\|env::remove_var' piano-runtime/src/ --include='*.rs'; then
            echo "::error::Found unsafe env var mutation in piano-runtime (see above)."
            echo "Use flush_to(dir) or Command::env() instead of std::env::set_var."
            exit 1
          fi
      - name: Reject #[test] touching collector globals without #[serial]
        run: |
          # Tests that touch collector global state (THREAD_RECORDS, FRAMES,
          # atomics, etc.) MUST use #[serial] to prevent races with other
          # tests in the same binary. Without it, non-serial tests run freely
          # alongside #[serial] tests, corrupting shared state.
          python3 -c "
          import re, glob, os, sys
          GLOBAL_PATTERNS = [
              'reset_all', 'set_runs_dir', 'clear_runs_dir',
              'STREAMING_ENABLED', 'STREAM_FRAMES', 'SHUTDOWN_DONE',
              'shutdown_impl_inner', 'shutdown()', 'shutdown_to(',
              'stream_file()', 'FRAME_BUFFER', 'RECORDS_BUF',
              'collect_frames', 'collect_all', 'drain_inflight_stack',
          ]
          # Only check src/ files (unit tests share a binary).
          # tests/ files are separate binaries and cannot race.
          files = glob.glob('piano-runtime/src/**/*.rs', recursive=True)
          violations = []
          for fpath in sorted(files):
              with open(fpath) as f:
                  content = f.read()
              test_re = re.compile(
                  r'((?:\s*#\[[^\]]*\]\s*)*#\[test\](?:\s*#\[[^\]]*\]\s*)*)\s*fn\s+(\w+)\s*\(',
                  re.MULTILINE,
              )
              matches = list(test_re.finditer(content))
              for i, m in enumerate(matches):
                  attrs, name = m.group(1), m.group(2)
                  if '#[serial]' in attrs:
                      continue
                  start = m.start()
                  end = matches[i + 1].start() if i + 1 < len(matches) else len(content)
                  body = content[start:end]
                  touched = [p for p in GLOBAL_PATTERNS if p in body]
                  if touched:
                      rel = os.path.relpath(fpath)
                      violations.append((rel, name, touched))
          if violations:
              print('::error::Tests touch collector globals without #[serial]:')
              for path, name, pats in violations:
                  print(f'  {path}::{name} -> {pats}')
              print()
              print('Fix: add #[serial] attribute to these tests.')
              print('See: https://docs.rs/serial_test/')
              sys.exit(1)
          print('All global-touching tests have #[serial]. OK.')
          "

  doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  mutants:
    continue-on-error: true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-mutants
        run: cargo install cargo-mutants --locked
      - name: Run mutation testing on changed runtime files
        run: |
          if git diff origin/main --name-only -- piano-runtime/src/ | grep -q .; then
            cargo mutants --package piano-runtime --in-diff <(git diff origin/main -- piano-runtime/src/) --jobs 4 --timeout 120 --features _test_internals,cpu-time,channels-crossbeam
          else
            echo "No piano-runtime/src/ changes, skipping mutation testing"
          fi
