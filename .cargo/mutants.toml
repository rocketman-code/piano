# cargo-mutants configuration
# https://mutants.rs/config.html

exclude_re = [
    # calibrate/store_ratio remainder: replacing % with + adds an extra
    # `denom * 2^64 / denom = 2^64` to the fixed-point intermediate, which
    # wraps to zero on the `as u64` cast. Mathematically equivalent.
    "replace % with \\+ in calibrate",
    "replace % with \\+ in store_ratio",
    # calibrate_bias trim: N/50 vs N%50 yields nearly identical means on
    # well-behaved data (2% trim vs 0% trim). Unkillable by test.
    "replace / with % in calibrate_bias",
]
